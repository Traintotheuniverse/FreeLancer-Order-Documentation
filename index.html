<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#756c83" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="接单记录" />
    <title>接单记录</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <section id="listView" class="view view-list">
        <header class="topbar">
          <div>
            <p class="eyebrow">Freelancer</p>
            <h1>接单记录</h1>
            <p class="app-version">v1.5</p>
          </div>
          <div class="top-actions">
            <button id="exportCsvBtn" class="icon-button" type="button" aria-label="导出 CSV">CSV</button>
            <button id="backupBtn" class="icon-button" type="button" aria-label="备份和恢复">备份</button>
          </div>
        </header>

        <nav class="segments" aria-label="订单筛选">
          <button class="segment is-active" type="button" data-filter="unpaid">未付款</button>
          <button class="segment" type="button" data-filter="all">全部</button>
          <button class="segment" type="button" data-filter="paid">已付款</button>
        </nav>

        <label class="month-filter">
          <span>月份</span>
          <select id="monthFilter" aria-label="按月份筛选">
            <option value="all">全部月份</option>
          </select>
        </label>

        <section id="backupPanel" class="backup-panel" hidden>
          <div>
            <strong>备份 / 恢复</strong>
            <p>导出完整数据，或从 JSON 备份合并恢复。</p>
          </div>
          <div class="backup-actions">
            <button id="exportBackupBtn" class="secondary-button" type="button">导出备份</button>
            <button id="importBackupBtn" class="secondary-button" type="button">导入备份</button>
          </div>
        </section>
        <input id="backupFileInput" type="file" accept="application/json,.json" hidden />

        <section id="summary" class="summary" aria-live="polite"></section>
        <main id="orderList" class="order-list"></main>

        <button id="addOrderBtn" class="floating-action" type="button">新增订单</button>
      </section>

      <section id="formView" class="view view-form" hidden>
        <header class="form-header">
          <button id="backBtn" class="text-button" type="button">返回</button>
          <h2 id="formTitle">新增订单</h2>
          <button id="deleteBtn" class="text-button danger" type="button" hidden>删除</button>
        </header>

        <form id="orderForm" class="order-form" novalidate>
          <div id="formMessage" class="form-message" role="alert" hidden></div>

          <label class="field">
            <span>接单日期 *</span>
            <input id="orderDate" name="orderDate" type="date" required />
          </label>

          <label class="field">
            <span>项目 *</span>
            <input id="project" name="project" type="text" placeholder="例如：品牌设计" required />
          </label>

          <label class="field">
            <span>客户</span>
            <input id="client" name="client" type="text" list="clientOptions" placeholder="例如：小林 / XX 公司" />
            <datalist id="clientOptions"></datalist>
          </label>

          <label class="field description-field">
            <span>项目说明</span>
            <textarea id="description" name="description" rows="2" placeholder="例如：某品牌七夕KV"></textarea>
          </label>

          <div class="two-columns">
            <label class="field">
              <span>数量</span>
              <input id="quantity" name="quantity" type="number" inputmode="decimal" min="0.01" step="0.01" />
            </label>

            <label class="field">
              <span>单价</span>
              <input id="unitPrice" name="unitPrice" type="number" inputmode="decimal" min="0.01" step="0.01" />
            </label>
          </div>

          <div class="total-preview">
            <span>总价</span>
            <strong id="totalPrice">¥0</strong>
          </div>

          <label class="field">
            <span>交付日期</span>
            <input id="deliveryDate" name="deliveryDate" type="date" />
          </label>

          <fieldset class="status-field">
            <legend>付款状态</legend>
            <div class="status-toggle">
              <label>
                <input type="radio" name="paymentStatus" value="unpaid" checked />
                <span>未付款</span>
              </label>
              <label>
                <input type="radio" name="paymentStatus" value="paid" />
                <span>已付款</span>
              </label>
            </div>
          </fieldset>

          <label class="field">
            <span>付款日期</span>
            <input id="paymentDate" name="paymentDate" type="date" />
          </label>

          <div class="save-bar">
            <button id="saveBtn" class="primary-button" type="submit">保存订单</button>
          </div>
        </form>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
